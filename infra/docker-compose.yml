version: "3.9"

name: unified-streaming-lakehouse-platform

networks:
  platform:
    driver: bridge

volumes:
  kafka_data:
  postgres_data:
  minio_data:
  grafana_data:

services:
  kafka:
    image: apache/kafka:3.9.0
    container_name: uslp-kafka
    hostname: kafka
    networks:
      - platform
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_LOG_DIRS: "/var/lib/kafka/data"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_NUM_PARTITIONS: "3"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"
        ]
      interval: 15s
      timeout: 10s
      retries: 12
      start_period: 20s
    restart: unless-stopped

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: uslp-kafka-ui
    hostname: kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - platform
    ports:
      - "8080:8080"
    environment:
      DYNAMIC_CONFIG_ENABLED: "true"
      KAFKA_CLUSTERS_0_NAME: "local-kraft"
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: "kafka:9092"
    restart: unless-stopped

  postgres:
    image: postgres:16
    container_name: uslp-postgres
    hostname: postgres
    networks:
      - platform
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: "metastore"
      POSTGRES_USER: "hive"
      POSTGRES_PASSWORD: "hive"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hive -d metastore"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s
    restart: unless-stopped

  hive-metastore:
    image: bitsondatadev/hive-metastore:3.1.3
    container_name: uslp-hive-metastore
    hostname: hive-metastore
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    networks:
      - platform
    ports:
      - "9083:9083"
    environment:
      SERVICE_NAME: "metastore"
      DB_DRIVER: "postgres"
      SERVICE_OPTS: >-
        -Djavax.jdo.option.ConnectionDriverName=org.postgresql.Driver
        -Djavax.jdo.option.ConnectionURL=jdbc:postgresql://postgres:5432/metastore
        -Djavax.jdo.option.ConnectionUserName=hive
        -Djavax.jdo.option.ConnectionPassword=hive
        -Dfs.s3a.endpoint=http://minio:9000
        -Dfs.s3a.access.key=minio
        -Dfs.s3a.secret.key=minio123
        -Dfs.s3a.path.style.access=true
        -Dfs.s3a.impl=org.apache.hadoop.fs.s3a.S3AFileSystem
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2025-02-18T16-25-55Z
    container_name: uslp-minio
    hostname: minio
    command: server /data --console-address ":9001"
    networks:
      - platform
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: "minio"
      MINIO_ROOT_PASSWORD: "minio123"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 10s
      retries: 12
      start_period: 20s
    restart: unless-stopped

  minio-init:
    image: minio/mc:RELEASE.2025-02-15T10-36-16Z
    container_name: uslp-minio-init
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - platform
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minio minio123 &&
      mc mb --ignore-existing local/lakehouse &&
      mc mb --ignore-existing local/checkpoints &&
      mc anonymous set private local/lakehouse &&
      mc anonymous set private local/checkpoints
      "
    restart: "no"

  jobmanager:
    image: flink:1.20.1-scala_2.12-java17
    container_name: uslp-flink-jobmanager
    hostname: jobmanager
    depends_on:
      kafka:
        condition: service_healthy
      hive-metastore:
        condition: service_started
      minio:
        condition: service_healthy
    networks:
      - platform
    ports:
      - "8081:8081"
    command: jobmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: jobmanager
        rest.address: jobmanager
        rest.port: 8081
        taskmanager.numberOfTaskSlots: 4
        parallelism.default: 2
        execution.checkpointing.interval: 30s
        execution.checkpointing.mode: EXACTLY_ONCE
        state.backend: hashmap
        state.checkpoints.dir: s3://checkpoints/flink/
        state.savepoints.dir: s3://checkpoints/savepoints/
        s3.endpoint: http://minio:9000
        s3.path.style.access: true
        s3.access-key: minio
        s3.secret-key: minio123
        high-availability: none
    restart: unless-stopped

  taskmanager:
    image: flink:1.20.1-scala_2.12-java17
    container_name: uslp-flink-taskmanager
    hostname: taskmanager
    depends_on:
      jobmanager:
        condition: service_started
    networks:
      - platform
    command: taskmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: jobmanager
        taskmanager.numberOfTaskSlots: 4
        parallelism.default: 2
        execution.checkpointing.interval: 30s
        execution.checkpointing.mode: EXACTLY_ONCE
        state.backend: hashmap
        state.checkpoints.dir: s3://checkpoints/flink/
        state.savepoints.dir: s3://checkpoints/savepoints/
        s3.endpoint: http://minio:9000
        s3.path.style.access: true
        s3.access-key: minio
        s3.secret-key: minio123
    restart: unless-stopped

  trino:
    image: trinodb/trino:472
    container_name: uslp-trino
    hostname: trino
    depends_on:
      hive-metastore:
        condition: service_started
      minio:
        condition: service_healthy
    networks:
      - platform
    ports:
      - "8085:8080"
    volumes:
      - ../trino/etc:/etc/trino:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://localhost:8080/v1/info >/dev/null 2>&1"
        ]
      interval: 15s
      timeout: 10s
      retries: 12
      start_period: 20s
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v3.2.1
    container_name: uslp-prometheus
    hostname: prometheus
    depends_on:
      kafka:
        condition: service_healthy
      jobmanager:
        condition: service_started
      trino:
        condition: service_started
    networks:
      - platform
    ports:
      - "9090:9090"
    volumes:
      - ../observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.5.2
    container_name: uslp-grafana
    hostname: grafana
    depends_on:
      prometheus:
        condition: service_started
    networks:
      - platform
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: "admin"
      GF_SECURITY_ADMIN_PASSWORD: "admin"
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ../observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    restart: unless-stopped